services:
  # ── Backend FastAPI ──────────────────────────────────────────────
  backend:
    build:
      context: ../back-end
      dockerfile: Dockerfile
    container_name: cmdb_backend
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    ports:
      - "3001:3000"

  # ── Frontend Nginx ───────────────────────────────────────────────
  frontend:
    build:
      context: ../front-end
      dockerfile: Dockerfile
    container_name: cmdb_frontend
    restart: always
    ports:
      - "7443:80"
    depends_on:
      - backend

  # ── Worker Agentless ─────────────────────────────────────────────
  agentless-worker:
    build:
      context: ../cmdb-workers/agentless
      dockerfile: Dockerfile
    container_name: cmdb_agentless_worker
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ../cmdb-workers/agentless/.env
      - ./.env
    environment:
      AGENTLESS_INTERVAL_SECONDS: ${AGENTLESS_INTERVAL_SECONDS:-1200}
      AGENTLESS_INPUT_FILE: ${AGENTLESS_INPUT_FILE:-Pasta1.csv}
    depends_on:
      - backend

  # ── Worker Agentes ──────────────────────────────────────────────
  agentes-worker:
    build:
      context: ../cmdb-workers/agentes
      dockerfile: Dockerfile
    container_name: cmdb_agentes_worker
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ../cmdb-workers/agentes/.env
      - ./.env
    environment:
      RUN_FOREVER: "true"
      SYNC_INTERVAL_SECONDS: ${AGENTES_INTERVAL_SECONDS:-1260}
    depends_on:
      - backend
